<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generator Diploma</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <section id="feedbackStep" class="step">
    <h1>Feedback anonim (obligatoriu)</h1>
    <div class="card">
      <p class="note">Vă rugăm să răspundeți la toate întrebările. După trimitere vă veți putea genera diploma.</p>
      <form id="feedbackForm" novalidate>
        <div id="questionsContainer"></div>
        <button id="feedbackSubmitBtn" type="submit">Trimite feedback și continuă</button>
        <p id="feedbackStatus" class="feedback-status" aria-live="polite"></p>
      </form>
    </div>
  </section>

  <section id="diplomaStep" class="step" hidden>
    <h1>Completați-vă numele și descărcați diploma</h1>

    <div class="card">
      <label for="nameInput">Numele participantului</label>
      <input type="text" id="nameInput" placeholder="Introduceți numele complet…" autofocus />
      <button id="downloadBtn">⬇️ Descărcare diplomă (PDF)</button>
      <div id="emailSection">
        <label for="emailInput">Email (opțional)</label>
        <input type="email" id="emailInput" placeholder="exemplu@email.com" />
        <button id="sendBtn" class="secondary-btn">Trimite diploma pe email</button>
        <p id="sendStatus" class="send-status" aria-live="polite"></p>
      </div>
    </div>

    <div class="preview-wrapper">
      <h2>Previzualizare</h2>
      <canvas id="previewCanvas"></canvas>
    </div>
  </section>

  <script type="module" src="/js/main.js"></script>
</body>
</html>
