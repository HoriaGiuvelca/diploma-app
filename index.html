<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Diploma Generator</title>

  <!-- Mobile friendly -->
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- html2pdf (bundles html2canvas + jsPDF) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      padding: 20px;
      text-align: center;
    }

    input,
    button {
      font-size: 18px;
      padding: 10px;
      margin: 10px;
      width: 90%;
      max-width: 400px;
    }

    button {
      cursor: pointer;
    }

    /* DIPLOMA PAGE */
    #diploma {
      width: 1123px;
      /* A4 landscape @ 96dpi */
      height: 794px;
      background: white;
      margin: auto;
      display: none;
      padding: 80px;
      box-sizing: border-box;
      position: relative;
    }

    #diploma h1 {
      font-size: 48px;
      margin-bottom: 40px;
    }

    #diploma h2 {
      font-size: 40px;
      margin: 20px 0;
    }

    #diploma p {
      font-size: 24px;
    }

    /* Optional background image */
    .background {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }
  </style>
</head>

<body>

  <h2>Generate Your Diploma</h2>

  <input type="text" id="nameInput" placeholder="Enter your full name" />

  <button onclick="generatePDF()">Download Diploma (PDF)</button>

  <!-- This is what becomes the PDF -->
  <div id="diploma">
    <!-- Optional background -->
    <img src="diploma-bg.png" class="background" />

    <h1 id="eventTitle">Event Name</h1>
    <p>This certifies that</p>
    <h2 id="nameField">Your Name</h2>
    <p>
      has successfully completed the program.
    </p>

    <h1>Certificate of Completion</h1>
    <p>This certifies that</p>
    <h2 id="nameField">Your Name</h2>
    <p>
      has successfully completed the program.
    </p>
  </div>

  <script>
    // Read URL parameter (e.g. ?event=FTC%202026)
    function getEventName() {
      const params = new URLSearchParams(window.location.search);
      return params.get("event") || "Certificate of Completion";
    }

    // Set event title on page load
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("eventTitle").innerText = getEventName();
    });

    function generatePDF() {
      const name = document.getElementById("nameInput").value.trim();

      if (!name) {
        alert("Please enter your name");
        return;
      }

      document.getElementById("nameField").innerText = name;

      const diploma = document.getElementById("diploma");
      diploma.style.display = "block";

      const options = {
        margin: 0,
        filename: "diploma.pdf",
        image: { type: "jpeg", quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: {
          unit: "px",
          format: [1123, 794],
          orientation: "landscape"
        }
      };

      html2pdf()
        .set(options)
        .from(diploma)
        .save()
        .then(() => {
          diploma.style.display = "none";
        });
    }
  </script>

</body>

</html>
