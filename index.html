<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diploma Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      gap: 28px;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a237e;
      letter-spacing: 0.5px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.10);
      padding: 28px 32px;
      width: 100%;
      max-width: 520px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 6px;
      font-weight: 600;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #d0d0d0;
      border-radius: 7px;
      font-size: 1.1rem;
      color: #222;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus {
      border-color: #1a237e;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #1a237e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #283593; }
    button:active { background: #0d1560; }

    .preview-wrapper {
      width: 100%;
      max-width: 900px;
    }

    .preview-wrapper h2 {
      font-size: 0.9rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      text-align: center;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.15);
      display: block;
    }
  </style>
</head>
<body>

  <h1>Generator Diploma</h1>

  <div class="card">
    <label for="nameInput">Numele participantului</label>
    <input type="text" id="nameInput" placeholder="Introduceți numele complet" autofocus />
    <button id="downloadBtn">Descarcă diploma (PDF)</button>
  </div>

  <div class="preview-wrapper">
    <h2>Previzualizare</h2>
    <canvas id="previewCanvas"></canvas>
  </div>

    const IMG_W     = 1216;
    const IMG_H     = 808;

    // Position of the name line (center of the underline on the diploma)
    const NAME_X_PCT = 52;   // % from left horizontally centered
    const NAME_Y_PCT = 43.5; // % from top on the name line

    // Text style matches the diploma's dark-blue heading colour
    const FONT_SIZE_DEFAULT = 36;  // px (on the full-res canvas)
    const FONT_SIZE_MIN     = 22;  // px 22 hard minimum; input blocked below this
    const FONT_FACE  = 'Georgia, serif';
    const FONT_COLOR = '#1a237e';

    // Usable width of the name line on the diploma (px at full resolution)
    const LINE_WIDTH = IMG_W * 0.45;
    // â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€

    const canvas = document.getElementById('previewCanvas');
    const ctx    = canvas.getContext('2d');
    canvas.width  = IMG_W;
    canvas.height = IMG_H;

    const bgImg = new Image();
    bgImg.src = IMG_SRC;

    const nameInput = document.getElementById('nameInput');

    // Returns the font size that fits `text` within LINE_WIDTH, clamped to [FONT_SIZE_MIN, FONT_SIZE_DEFAULT]
    function calcFontSize(text) {
      let size = FONT_SIZE_DEFAULT;
      ctx.font = `${size}px ${FONT_FACE}`;
      while (ctx.measureText(text).width > LINE_WIDTH && size > FONT_SIZE_MIN) {
        size--;
        ctx.font = `${size}px ${FONT_FACE}`;
      }
      return size;
    }

    function drawPreview() {
      ctx.clearRect(0, 0, IMG_W, IMG_H);
      ctx.drawImage(bgImg, 0, 0, IMG_W, IMG_H);

      const name = nameInput.value.trim();
      if (!name) return;

      const size = calcFontSize(name);
      const x = (NAME_X_PCT / 100) * IMG_W;
      const y = (NAME_Y_PCT / 100) * IMG_H;

      ctx.save();
      ctx.fillStyle    = FONT_COLOR;
      ctx.font         = `${size}px ${FONT_FACE}`;
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(name, x, y);
      ctx.restore();
    }

    // Returns the longest prefix of `text` that fits within LINE_WIDTH at FONT_SIZE_MIN
    function truncateToLimit(text) {
      ctx.font = `${FONT_SIZE_MIN}px ${FONT_FACE}`;
      if (ctx.measureText(text).width <= LINE_WIDTH) return text;
      let lo = 0, hi = text.length;
      while (lo < hi) {
        const mid = Math.ceil((lo + hi) / 2);
        ctx.font = `${FONT_SIZE_MIN}px ${FONT_FACE}`;
        if (ctx.measureText(text.slice(0, mid)).width <= LINE_WIDTH) lo = mid;
        else hi = mid - 1;
      }
      return text.slice(0, lo);
    }

    // Block further input when text already needs minimum font size and is still too wide
    nameInput.addEventListener('keydown', (e) => {
      // Always allow control keys (backspace, delete, arrows, etc.)
      if (e.key.length !== 1) return;

      const projected = nameInput.value + e.key;
      ctx.font = `${FONT_SIZE_MIN}px ${FONT_FACE}`;
      if (ctx.measureText(projected.trim()).width > LINE_WIDTH) {
        e.preventDefault();
      }
    });

    // Intercept paste: truncate pasted text to what fits
    nameInput.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = (e.clipboardData || window.clipboardData).getData('text');
      const combined = nameInput.value.slice(0, nameInput.selectionStart)
        + pasted
        + nameInput.value.slice(nameInput.selectionEnd);
      nameInput.value = truncateToLimit(combined);
      nameInput.dispatchEvent(new Event('input'));
    });

    bgImg.onload = drawPreview;
    nameInput.addEventListener('input', drawPreview);

    // PDF download
    document.getElementById('downloadBtn').addEventListener('click', () => {
      const name = nameInput.value.trim();
      if (!name) { alert('Introduceți mai întâi un nume.'); return; }

      const { jsPDF } = window.jspdf;

      // Match PDF dimensions to image aspect ratio (A4 landscape = 297×210mm)
      const PDF_W = 297;
      const PDF_H = Math.round((IMG_H / IMG_W) * PDF_W); // ≈197mm

      const doc = new jsPDF({
        orientation: 'landscape',
        unit: 'mm',
        format: [PDF_W, PDF_H]
      });

      const imgData = canvas.toDataURL('image/jpeg', 1.0);
      doc.addImage(imgData, 'JPEG', 0, 0, PDF_W, PDF_H);

      doc.save(`Diploma - ${name}.pdf`);
    });
  </script>
